<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TH DATA - 号码筛选平台</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0d0f14;
  --bg2:#141720;
  --bg3:#1c2030;
  --bg4:#242840;
  --border:#2a2f45;
  --border2:#353b58;
  --text:#e8eaf0;
  --text2:#9199b8;
  --text3:#5a6280;
  --accent:#4f8ef7;
  --accent2:#3a7ae0;
  --green:#2ecc7a;
  --green2:#1fa85a;
  --yellow:#f5a623;
  --red:#e05252;
  --purple:#8b5cf6;
  --radius:10px;
  --radius2:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh;overflow-x:hidden}
a{color:var(--accent);text-decoration:none}

/* LAYOUT */
#app{display:flex;min-height:100vh}
#sidebar{width:220px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
#main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
#topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
#content{padding:28px;flex:1}

/* SIDEBAR */
.logo{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff}
.logo-text{font-weight:700;font-size:16px;color:var(--text)}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
.nav-section{padding:16px 12px 4px;font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 14px;margin:1px 8px;border-radius:var(--radius);cursor:pointer;color:var(--text2);font-size:13.5px;transition:all .15s;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:rgba(79,142,247,.15);color:var(--accent);font-weight:500}
.nav-item svg{width:16px;height:16px;flex-shrink:0}
.nav-bottom{margin-top:auto;padding:12px;border-top:1px solid var(--border)}
.user-pill{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--radius);background:var(--bg3)}
.user-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.user-info{flex:1;overflow:hidden}
.user-name{font-size:12.5px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-bal{font-size:11px;color:var(--green);white-space:nowrap}

/* TOPBAR */
.page-title{font-size:15px;font-weight:600;color:var(--text)}
.topbar-actions{display:flex;align-items:center;gap:10px}
.lang-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:12px}
.lang-btn:hover{color:var(--text);border-color:var(--border2)}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:18px 20px}
.stat-label{font-size:12px;color:var(--text3);margin-bottom:6px}
.stat-value{font-size:26px;font-weight:700;color:var(--text)}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.stat-card.accent-green .stat-value{color:var(--green)}
.stat-card.accent-blue .stat-value{color:var(--accent)}
.stat-card.accent-yellow .stat-value{color:var(--yellow)}

/* SECTION */
.section{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);overflow:hidden}
.section-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.section-title{font-size:14px;font-weight:600;color:var(--text)}
.section-body{padding:20px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;border:none;transition:all .15s;text-decoration:none}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--bg3);border:1px solid var(--border2);color:var(--text)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn-danger{background:rgba(224,82,82,.15);border:1px solid var(--red);color:var(--red)}
.btn-success{background:rgba(46,204,122,.15);border:1px solid var(--green);color:var(--green)}
.btn-sm{padding:5px 10px;font-size:12px}

/* FORMS */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:12px;color:var(--text2);margin-bottom:6px;font-weight:500}
.form-input,.form-select,.form-textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 12px;font-size:13.5px;font-family:inherit;outline:none;transition:border-color .15s}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent)}
.form-input::placeholder{color:var(--text3)}
.form-textarea{resize:vertical;min-height:80px}
.form-select option{background:var(--bg3)}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.05em;text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.02)}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:rgba(46,204,122,.15);color:var(--green)}
.badge-blue{background:rgba(79,142,247,.15);color:var(--accent)}
.badge-yellow{background:rgba(245,166,35,.15);color:var(--yellow)}
.badge-red{background:rgba(224,82,82,.15);color:var(--red)}
.badge-gray{background:rgba(255,255,255,.07);color:var(--text2)}
.badge-purple{background:rgba(139,92,246,.15);color:var(--purple)}

/* AUTH */
#auth-screen{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px}
.auth-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:36px 32px;width:100%;max-width:400px}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo-icon{width:50px;height:50px;background:var(--accent);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:20px;color:#fff;margin-bottom:10px}
.auth-logo h1{font-size:20px;font-weight:700;color:var(--text)}
.auth-logo p{font-size:13px;color:var(--text3);margin-top:4px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:8px;padding:3px;margin-bottom:24px;gap:3px}
.auth-tab{flex:1;text-align:center;padding:7px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s}
.auth-tab.active{background:var(--bg2);color:var(--text);font-weight:500}
.auth-divider{text-align:center;font-size:12px;color:var(--text3);margin:8px 0}
.auth-err{background:rgba(224,82,82,.12);border:1px solid var(--red);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}

/* PROGRESS BAR */
.progress-bar{background:var(--bg3);border-radius:20px;height:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:20px;background:var(--accent);transition:width .4s}

/* UPLOAD ZONE */
.upload-zone{border:2px dashed var(--border2);border-radius:var(--radius2);padding:32px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg3)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(79,142,247,.05)}
.upload-zone p{color:var(--text2);font-size:13px;margin-top:8px}
.upload-zone.has-file{border-color:var(--green);background:rgba(46,204,122,.05)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;display:none}
.modal-overlay.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600;color:var(--text)}
.modal-close{cursor:pointer;color:var(--text3);font-size:20px;line-height:1}
.modal-close:hover{color:var(--text)}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:var(--radius);font-size:13.5px;color:#fff;min-width:220px;animation:slideIn .2s ease;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.toast-success{background:#1a6b3e}
.toast-error{background:#7a2020}
.toast-info{background:#1a3a6b}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ADMIN TAB */
.admin-tabs{display:flex;gap:4px;margin-bottom:20px;background:var(--bg3);padding:4px;border-radius:10px;display:inline-flex}
.admin-tab{padding:7px 16px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2)}
.admin-tab.active{background:var(--bg2);color:var(--text);font-weight:500}

/* PRICE GRID */
.price-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.price-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.price-card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.price-card-icon{font-size:18px}
.price-card-name{font-size:13px;font-weight:600;color:var(--text)}
.price-item{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px}
.price-item:last-child{border-bottom:none}
.price-item-label{color:var(--text2)}
.price-item-val{color:var(--accent);font-weight:500}
.price-item-status{padding:2px 6px;border-radius:10px;font-size:10px}

/* HOME GRID */
.home-stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.home-stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:20px;position:relative;overflow:hidden}
.home-stat-title{font-size:14px;color:var(--text);font-weight:600;margin-bottom:12px;display:flex;justify-content:space-between}
.home-stat-value{font-size:28px;font-weight:700;color:var(--text);margin-bottom:16px}
.home-stat-bottom{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);border-top:1px solid var(--border);padding-top:12px}
.home-stat-bottom span{color:var(--text2)}
.service-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;margin-top:16px}
.service-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius2);padding:16px}
.service-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;font-size:15px;font-weight:600;color:var(--text)}
.service-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg3)}
.service-item{display:flex;justify-content:space-between;align-items:center;padding:10px 8px;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px;cursor:pointer;border-radius:6px;transition:all .2s}
.service-item:last-child{border-bottom:none}
.service-item:hover{background:rgba(79,142,247,.1);transform:translateX(4px)}
.service-price{color:var(--accent);font-family:monospace;font-size:12px}
.service-closed{color:var(--text3);font-size:12px;background:rgba(255,255,255,.05);padding:2px 6px;border-radius:4px}

/* MISC */
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state svg{width:40px;height:40px;margin:0 auto 12px;opacity:.3;display:block}
.copy-addr{cursor:pointer;color:var(--accent);font-size:12px;margin-left:8px}
.copy-addr:hover{text-decoration:underline}
.info-box{background:rgba(79,142,247,.08);border:1px solid rgba(79,142,247,.25);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--text2);margin-bottom:16px}
.info-box strong{color:var(--accent)}
.steps{display:flex;gap:12px;margin:12px 0}
.step{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:12px;text-align:center;font-size:12px}
.step-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-weight:700;font-size:12px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:6px}
.step-label{color:var(--text2)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:700px){.two-col{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}#sidebar{transform:translateX(-220px)}#main{margin-left:0}}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:5px}
.dot-green{background:var(--green)}
.dot-yellow{background:var(--yellow)}
.dot-blue{background:var(--accent)}
.dot-red{background:var(--red)}
.qr-box{background:#fff;border-radius:8px;padding:8px;display:inline-block}
.wallet-addr{font-family:monospace;font-size:12px;background:var(--bg3);padding:8px 12px;border-radius:6px;word-break:break-all;color:var(--text2);border:1px solid var(--border)}
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">TH</div>
      <h1>TH DATA</h1>
      <p id="auth-subtitle">号码筛选平台 · Phone Screening Platform</p>
    </div>
    <div class="auth-tabs">
      <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">登录 Login</div>
      <div class="auth-tab" id="tab-register" onclick="switchAuthTab('register')">注册 Register</div>
    </div>
    <div id="auth-err" class="auth-err"></div>
    <div id="login-form">

        <label class="form-label">邮箱 Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">密码 Password</label>
        <input type="password" id="login-pwd" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doLogin()" id="login-btn">登录 Login</button>
    </div>
    <div id="register-form" style="display:none">
      <div class="form-group">
        <label class="form-label">邮箱 Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="your@email.com"/>
      </div>
      <div class="form-group">
        <label class="form-label">密码 Password（至少6位 / min 6 chars）</label>
        <input type="password" id="reg-pwd" class="form-input" placeholder="••••••••"/>
      </div>
      <div class="form-group">
        <label class="form-label">确认密码 Confirm Password</label>
        <input type="password" id="reg-pwd2" class="form-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')doRegister()"/>
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center" onclick="doRegister()" id="reg-btn">注册 Register</button>
    </div>
  </div>
</div>

<!-- MAIN APP -->
<div id="app" style="display:none">
  <!-- Sidebar -->
  <div id="sidebar">
    <div class="logo">
      <div class="logo-icon">TH</div>
      <div>
        <div class="logo-text">TH DATA</div>
        <div class="logo-sub">筛选平台 Screening</div>
      </div>
    </div>
    <div style="overflow-y:auto;flex:1">
      <div class="nav-section" id="nav-sec1">主菜单 MENU</div>
      <div class="nav-item active" onclick="navigate('dashboard')" id="nav-dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <span id="nav-label-dashboard">首页 Home</span>
      </div>
      <div class="nav-section" style="margin-top:10px">筛选项目 SERVICES</div>
      <div id="project-nav-container"></div>
      <div class="nav-item" onclick="navigate('recharge')" id="nav-recharge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <span id="nav-label-recharge">充值 Recharge</span>
      </div>
      <div class="nav-item" onclick="navigate('logs')" id="nav-logs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></svg>
        <span id="nav-label-logs">积分记录 Balance Logs</span>
      </div>
      <div class="nav-item" onclick="navigate('prices')" id="nav-prices">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <span id="nav-label-prices">价格列表 Pricing</span>

      <div id="admin-nav" style="display:none">

    <div class="nav-bottom">

        <span id="logout-label">退出 Logout</span>
      </button>
    </div>
  </div>

  <!-- Main -->
  <div id="main">
    <div id="topbar">
      <div class="page-title" id="page-title">控制台</div>
      <div class="topbar-actions">
        <button class="lang-btn" onclick="toggleLang()">🌐 <span id="lang-toggle-label">EN</span></button>
        <div style="font-size:12px;color:var(--text3)" id="topbar-balance">余额: 0</div>
      </div>
    </div>
    <div id="content">
      <!-- Pages rendered here -->
    </div>
  </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="modal-approve">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modal-approve-title">审核充值订单</div>
      <div class="modal-close" onclick="closeModal('modal-approve')">×</div>
    </div>
    <div id="modal-approve-body"></div>
  </div>
</div>
<div class="modal-overlay" id="modal-adjust">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">手动调整积分 / Adjust Balance</div>
      <div class="modal-close" onclick="closeModal('modal-adjust')">×</div>
    </div>
    <div id="modal-adjust-body"></div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

// AUTH
function switchAuthTab(tab){
  document.getElementById('tab-login').classList.toggle('active',tab==='login');
  document.getElementById('tab-register').classList.toggle('active',tab==='register');
  document.getElementById('login-form').style.display=tab==='login'?'':'none';
  document.getElementById('register-form').style.display=tab==='register'?'':'none';
  document.getElementById('auth-err').style.display='none';
}
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pwd=document.getElementById('login-pwd').value;
  if(!email||!pwd){showAuthErr('请填写邮箱和密码 / Please fill in email and password');return;}
  const btn=document.getElementById('login-btn');
  btn.textContent='登录中...';btn.disabled=true;
  try{
    // 修复BUG核心：登录前强制清除本地可能损坏的旧会话状态
    await sb.auth.signOut();
    
    const{data,error}=await sb.auth.signInWithPassword({email,password:pwd});
    if(error){showAuthErr(error.message);return;}
    // 显式写入 session，防止 localStorage 未自动持久化
    if(data?.session){
      await sb.auth.setSession({
        access_token:data.session.access_token,
        refresh_token:data.session.refresh_token
      });
    }
    if(data?.user){
      currentUser=data.user;
      await loadProfile();
      // 兜底：若 profile 查询失败则构造最小对象并写库
      if(!currentProfile){
        currentProfile={id:data.user.id,email:data.user.email,balance:0,role:'user'};
        try{
          await sb.from('profiles').upsert({
            id:data.user.id,
            email:data.user.email,
            balance:0,
            role:'user',
            created_at:new Date().toISOString()
          });
        }catch(ue){console.warn('upsert profile failed:',ue.message);}
      }
      document.getElementById('auth-screen').style.display='none';
      document.getElementById('app').style.display='flex';
      updateSidebar();
      navigate('dashboard');
    }
  } catch(e){
    showAuthErr('登录异常，请重试 / Login error: '+e.message);
  } finally{
    btn.textContent='登录 Login';btn.disabled=false;
  }
}
async function doRegister(){
  const email=document.getElementById('reg-email').value.trim();
  const pwd=document.getElementById('reg-pwd').value;
  const pwd2=document.getElementById('reg-pwd2').value;
  if(!email||!pwd){showAuthErr('请填写所有字段 / Please fill all fields');return;}
  if(pwd!==pwd2){showAuthErr('两次密码不一致 / Passwords do not match');return;}
  if(pwd.length<6){showAuthErr('密码至少6位 / Password min 6 chars');return;}
  document.getElementById('reg-btn').textContent='注册中...';
  const{error}=await sb.auth.signUp({email,password:pwd});
  document.getElementById('reg-btn').textContent='注册 Register';
  if(error){showAuthErr(error.message);return;}
  toast('注册成功！请登录 / Registered! Please log in','success');
  switchAuthTab('login');
}

// INIT
async function initApp(session) {
  if(session?.user && !currentUser){
    currentUser=session.user;
    await loadProfile();
    if(!currentProfile){
      currentProfile={id:session.user.id,email:session.user.email,balance:0,role:'user'};
    }
    document.getElementById('auth-screen').style.display='none';
    document.getElementById('app').style.display='flex';
    renderProjectNav();
    updateSidebar();
    navigate('dashboard');
  }
}

sb.auth.onAuthStateChange(async(event,session)=>{
  if((event==='SIGNED_IN' || event==='INITIAL_SESSION') && session){
    initApp(session);
  } else if (event === 'SIGNED_OUT') {
    currentUser=null;
    currentProfile=null;
    document.getElementById('app').style.display='none';
    document.getElementById('auth-screen').style.display='flex';
  }
});

sb.auth.getSession().then(({data:{session}, error})=>{
  if(error || !session){
    if(error) sb.auth.signOut(); // 如果 Token 损坏则自动清理
    document.getElementById('auth-screen').style.display='flex';
  } else {
    initApp(session); // 刷新页面时自动恢复登录状态
  }
});

// ─── PROXY HELPER ───
// All calls to api.th333.cc go through the Supabase Edge Function to avoid CORS.
async function proxyFetch(apiPath, {method='GET', queryParams={}, body}={}){
  const {data:{session}}=await sb.auth.getSession();
  const jwt=session?.access_token||'';
  const url=new URL(PROXY_URL);
  url.searchParams.set('path',apiPath);
  Object.entries(queryParams).forEach(([k,v])=>url.searchParams.set(k,v));
  return fetch(url.toString(),{
    method,
    headers:{
      'Authorization':'Bearer '+jwt,
      // 移除前端传递的 x-th333-token，改由 Supabase Edge Function 后端自动注入
    },
    ...(body?{body}:{}),
  });
}

function navigate(page, subType = null){
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const nav=document.getElementById('nav-'+page);
  if(nav)nav.classList.add('active');
  
  // 拦截项目专属路由
  if(page.startsWith('project_')) {
    const projectId = page.replace('project_', '');
    const project = PROJECT_DATA.find(p => p.id === projectId);
    document.getElementById('page-title').textContent = project ? project.name : '';
    renderProject(projectId, subType);
    return;
  }

  document.getElementById('page-title').textContent=t(page);
  const pages={
    dashboard:renderDashboard,
    recharge:renderRecharge,
    logs:renderLogs,
    prices:renderPrices,
    admin:renderAdmin,
  };
  if(pages[page])pages[page]();
}

  const project = PROJECT_DATA.find(p => p.items.some(i => i.val === typeVal));
  if(project) {
    navigate('project_' + project.id, typeVal);
  }
}

async function submitProjectTask(taskType){
  const country=document.getElementById('task-country').value;
  const taskName=document.getElementById('task-name').value.trim();
  if(!selectedFile){toast(currentLang==='zh'?'请上传号码文件':'Please upload a file','error');return;}
  
  if(parseFloat(currentProfile?.balance || 0) <= 0){
    toast(currentLang==='zh'?'余额不足，请先充值':'Insufficient balance, please recharge','error');
    return;
  }

  const btn=document.getElementById('submit-task-btn');
  btn.textContent=currentLang==='zh'?'提交中...':'Submitting...';
  btn.disabled=true;
  try{
    const formData=new FormData();
    formData.append('file',selectedFile);
    formData.append('country',country);
    formData.append('taskType',taskType);
    if(taskName)formData.append('taskName',taskName);
    const res=await proxyFetch('/api/task/create',{method:'POST',body:formData});
    const data=await res.json();
    if(data.code!==0){
      toast((currentLang==='zh'?'提交失败: ':'Submit failed: ')+data.message,'error');
      return;
    }
    
    await sb.from('tasks').insert({
      user_id:currentUser.id,
      remote_task_id:data.data.taskId,
      task_name:taskName||data.data.taskId,
      task_type:taskType,
      country:data.data.country,
      task_total:data.data.taskTotal,
      status:data.data.taskState,
      points_consumed:data.consume?.deduction||0,
      file_name:selectedFile.name,
    });
    
    if(data.consume?.deduction>0){
      const balBefore=currentProfile.balance;
      const balAfter=balBefore - data.consume.deduction;
      await sb.from('balance_logs').insert({
        user_id:currentUser.id,
        type:'consume',
        amount:-data.consume.deduction,
        balance_before:balBefore,
        balance_after:balAfter,
        note:`任务 ${data.data.taskId}`,
      });
      await sb.from('profiles').update({balance:balAfter}).eq('id',currentUser.id);
      currentProfile.balance=balAfter;
    }
    
    toast(currentLang==='zh'?'任务提交成功！':'Task submitted successfully!','success');
    updateSidebar();
    selectedFile=null;
    
    // 提交成功后刷新当前项目页面
    const currentProjectId = PROJECT_DATA.find(p => p.items.some(i => i.val === taskType))?.id;
    if(currentProjectId) {
        renderProject(currentProjectId, taskType);
    }

  } catch(e){
    toast((currentLang==='zh'?'网络错误: ':'Network error: ')+e.message,'error');
  } finally{
    if(btn) {
        btn.textContent=currentLang==='zh'?'提交任务':'Submit Task';
        btn.disabled=false;
    }
  }
}

async function refreshProjectTask(taskId,remoteId, projectId, subTypeVal){
  if(!remoteId){toast(currentLang==='zh'?'无远程任务ID':'No remote task ID','error');return;}
  toast(currentLang==='zh'?'正在刷新...':'Refreshing...','info');
  try{
    const res=await proxyFetch('/api/task/progress',{queryParams:{taskId:remoteId}});
    const data=await res.json();
    if(data.code!==0){toast(data.message,'error');return;}
    const d=data.data;
    await sb.from('tasks').update({
      status:d.taskState,
      task_progress:d.taskProgress,
      valid_quantity:d.validQuantity,
      task_total:d.taskTotal,
    }).eq('id',taskId);
    toast(currentLang==='zh'?'状态已更新':'Status updated','success');
    renderProject(projectId, subTypeVal);
  } catch(e){toast(e.message,'error');}
}

async function downloadResult(taskId,remoteId){
  if(!remoteId){toast(currentLang==='zh'?'无远程任务ID':'No remote task ID','error');return;}
  toast(currentLang==='zh'?'正在下载...':'Downloading...','info');
  try{
    const res=await proxyFetch('/api/task/result',{queryParams:{taskId:remoteId}});
    if(!res.ok){toast(currentLang==='zh'?'下载失败':'Download failed','error');return;}
    const blob=await res.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download=`result_${remoteId}.txt`;a.click();
    URL.revokeObjectURL(url);
    toast(currentLang==='zh'?'下载成功':'Downloaded','success');
  } catch(e){toast(e.message,'error');}
}

            <th>USDT</th>
            <th>${t('points')}</th>
            <th>TXID</th>
            <th>${t('status')}</th>
            <th>${currentLang==='zh'?'时间':'Date'}</th>
            <th>${t('actions')}</th>
          </tr></thead>
          <tbody>
            ${(orders||[]).map(o=>`<tr>
              <td style="font-size:12px">${o.profiles?.email||o.user_id.slice(0,8)}</td>
              <td>${o.usdt_amount}</td>
              <td style="color:var(--green)">${o.points_amount}</td>
              <td style="font-family:monospace;font-size:10px;color:var(--text3)">${(o.tx_hash||'-').slice(0,14)}...</td>
              <td>${statusBadge(o.status)}</td>
              <td style="font-size:11px;color:var(--text3)">${new Date(o.created_at).toLocaleDateString()}</td>
              <td>${o.status==='pending'?`<div style="display:flex;gap:6px">
                <button class="btn btn-success btn-sm" onclick="approveOrder('${o.id}','${o.user_id}',${o.points_amount},'${o.usdt_amount}')">${currentLang==='zh'?'通过':'Approve'}</button>
                <button class="btn btn-danger btn-sm" onclick="rejectOrder('${o.id}')">${currentLang==='zh'?'拒绝':'Reject'}</button>
              </div>`:'-'}</td>
            </tr>`).join('')}
          </tbody>
        </table></div>`}
      </div>
    </div>`;
  } else if(tab==='users'){
    const{data:users}=await sb.from('profiles').select('*').order('created_at',{ascending:false});
    c.innerHTML=`<div class="section">
      <div class="section-header"><div class="section-title">${currentLang==='zh'?'用户列表':'User List'} (${(users||[]).length})</div></div>
      <div class="section-body" style="padding:0">
        <div class="table-wrap"><table>
          <thead><tr>
            <th>${currentLang==='zh'?'邮箱':'Email'}</th>
            <th>${currentLang==='zh'?'用户名':'Username'}</th>
            <th>${t('balance')}</th>
            <th>${currentLang==='zh'?'角色':'Role'}</th>
            <th>${currentLang==='zh'?'注册时间':'Joined'}</th>
            <th>${t('actions')}</th>
          </tr></thead>
          <tbody>
            ${(users||[]).map(u=>`<tr>
              <td style="font-size:12px">${u.email}</td>
              <td>${u.username||'-'}</td>
              <td style="color:var(--green);font-weight:600">${parseFloat(u.balance||0).toFixed(2)}</td>
              <td><span class="badge ${u.role==='admin'?'badge-purple':'badge-gray'}">${u.role}</span></td>
              <td style="font-size:11px;color:var(--text3)">${new Date(u.created_at).toLocaleDateString()}</td>
              <td><button class="btn btn-secondary btn-sm" onclick="openAdjustModal('${u.id}','${u.email}',${u.balance})">${currentLang==='zh'?'调整积分':'Adjust'}</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        </div>
      </div>
    </div>`;
  } else if(tab==='settings'){
    const{data:settings}=await sb.from('site_settings').select('*');
    const cfg={};(settings||[]).forEach(s=>cfg[s.key]=s.value);
    c.innerHTML=`<div class="section">
      <div class="section-header"><div class="section-title">${currentLang==='zh'?'系统设置':'System Settings'}</div></div>
      <div class="section-body">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">USDT → 积分 汇率 / Exchange Rate</label>
            <input type="text" id="cfg-rate" class="form-input" value="${cfg.usdt_to_points||'6.8'}"/>
          </div>
          <div class="form-group">
            <label class="form-label">${currentLang==='zh'?'网站名称':'Site Name'}</label>
            <input type="text" id="cfg-sitename" class="form-input" value="${cfg.site_name||'TH DATA'}"/>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label">TRC20-USDT ${currentLang==='zh'?'收款钱包地址':'Wallet Address'}</label>
          <input type="text" id="cfg-wallet" class="form-input" value="${cfg.usdt_wallet_address||''}"/>
        </div>
        <button class="btn btn-primary" onclick="saveSettings()">${currentLang==='zh'?'保存设置':'Save Settings'}</button>
      </div>
    </div>`;
  }
}

async function approveOrder(orderId,userId,points,usdt){
  if(!confirm(`${currentLang==='zh'?'确认通过此充值申请？':'Approve this recharge?'}\nUSDT: ${usdt} | ${t('points')}: ${points}`))return;
  // Get user balance
  const{data:profile}=await sb.from('profiles').select('balance').eq('id',userId).single();
  const balBefore=parseFloat(profile?.balance||0);
  const balAfter=balBefore+parseFloat(points);
  // Update order
  await sb.from('recharge_orders').update({status:'approved',reviewed_by:currentUser.id,reviewed_at:new Date().toISOString()}).eq('id',orderId);
  // Add balance
  await sb.from('profiles').update({balance:balAfter}).eq('id',userId);
  // Log
  await sb.from('balance_logs').insert({user_id:userId,type:'recharge',amount:parseFloat(points),balance_before:balBefore,balance_after:balAfter,note:`充值 ${usdt} USDT`,ref_id:orderId});
  toast(currentLang==='zh'?'已通过，积分已到账':'Approved, points added','success');
  loadAdminTab('orders');
}

async function rejectOrder(orderId){
  const reason=prompt(currentLang==='zh'?'拒绝原因（可选）:':'Reject reason (optional):');
  await sb.from('recharge_orders').update({status:'rejected',admin_note:reason||'',reviewed_by:currentUser.id,reviewed_at:new Date().toISOString()}).eq('id',orderId);
  toast(currentLang==='zh'?'已拒绝':'Rejected','info');
  loadAdminTab('orders');
}

function openAdjustModal(userId,email,balance){
  document.getElementById('modal-adjust-body').innerHTML=`
    <div class="form-group">
      <label class="form-label">${currentLang==='zh'?'用户':'User'}: ${email}</label>
      <label class="form-label">${currentLang==='zh'?'当前余额':'Current Balance'}: <strong>${parseFloat(balance).toFixed(2)} 积分</strong></label>
    </div>
    <div class="form-group">
      <label class="form-label">${currentLang==='zh'?'调整金额（正数增加，负数减少）':'Adjust amount (positive=add, negative=deduct)'}</label>
      <input type="number" id="adjust-amt" class="form-input" placeholder="e.g. 100 or -50"/>
    </div>
    <div class="form-group">
      <label class="form-label">${currentLang==='zh'?'备注':'Note'}</label>
      <input type="text" id="adjust-note" class="form-input" placeholder="${currentLang==='zh'?'调整原因...':'Reason...'}"/>
    </div>
    <button class="btn btn-primary" onclick="doAdjust('${userId}',${balance})">${t('confirm')}</button>`;
  openModal('modal-adjust');
}

async function doAdjust(userId,currentBal){
  const amt=parseFloat(document.getElementById('adjust-amt').value);
  const note=document.getElementById('adjust-note').value;
  if(isNaN(amt)||amt===0){toast(currentLang==='zh'?'请输入有效金额':'Enter valid amount','error');return;}
  const balBefore=parseFloat(currentBal);
  const balAfter=balBefore+amt;
  if(balAfter<0){toast(currentLang==='zh'?'余额不能为负':'Balance cannot be negative','error');return;}
  await sb.from('profiles').update({balance:balAfter}).eq('id',userId);
  await sb.from('balance_logs').insert({user_id:userId,type:'admin_adjust',amount:amt,balance_before:balBefore,balance_after:balAfter,note:note||'管理员调整'});
  toast(currentLang==='zh'?'积分已调整':'Balance adjusted','success');
  closeModal('modal-adjust');
  loadAdminTab('users');
}

async function saveSettings(){
  const rate=document.getElementById('cfg-rate').value.trim();
  const wallet=document.getElementById('cfg-wallet').value.trim();
  const siteName=document.getElementById('cfg-sitename').value.trim();
  await Promise.all([
    sb.from('site_settings').upsert({key:'usdt_to_points',value:rate,updated_at:new Date().toISOString()}),
    sb.from('site_settings').upsert({key:'usdt_wallet_address',value:wallet,updated_at:new Date().toISOString()}),
    sb.from('site_settings').upsert({key:'site_name',value:siteName,updated_at:new Date().toISOString()}),
  ]);
  toast(currentLang==='zh'?'设置已保存':'Settings saved','success');
}
</script>
</body>
</html>
